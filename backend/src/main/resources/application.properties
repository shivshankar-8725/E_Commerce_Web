# ===== Server =====
server.port=8080

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/e_mart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== JWT =====
# Use a long random secret in production (>= 32 bytes). Override via env var JWT_SECRET.
app.jwt.secret=${JWT_SECRET:Zm9yLWRldi1vbmx5LWNoYW5nZS1tZS1lbWFydC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=}
# Token validity in milliseconds (24h)
app.jwt.expiration-ms=86400000

# ===== Seed admin (created once on first boot if not present) =====
app.admin.name=Store Owner
app.admin.mobile=9999999999
app.admin.email=admin@emart.local
app.admin.password=Admin@123

# ===== Dealer (Phase 2) =====
# Minimum quantity per item a dealer must order (bulk ordering).
app.dealer.min-order-qty=10

# ===== Delivery charge =====
# Flat delivery fee added when the order amount is below the free-delivery threshold.
app.delivery.charge=50
app.delivery.free-above=1000

# ===== Razorpay (Phase 3: online payments, TEST MODE) =====
# Put your Razorpay TEST keys here OR (preferred) as env vars RAZORPAY_KEY_ID / RAZORPAY_KEY_SECRET.
# Leave blank to keep ONLINE payment disabled (COD still works). The SECRET must NEVER reach the frontend.
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.currency=INR

# ===== SMS notifications (Phase 4: P4-NOTI-01) =====
# provider: 'twilio' for real SMS, or 'log' to just print messages to the console (default; no account needed).
app.sms.provider=${SMS_PROVIDER:log}
app.sms.default-country-code=+91
# Twilio TEST/LIVE credentials (only needed when provider=twilio). Prefer env vars; never commit live keys.
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.from-number=${TWILIO_FROM_NUMBER:}
# Mobile number that receives "new order" alerts (defaults to the seeded admin's mobile).
app.admin.notify-mobile=${ADMIN_NOTIFY_MOBILE:9999999999}

# ===== File uploads (product images) =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ===== CORS (React dev server) =====
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
